<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiểm Duyệt Thực Phẩm AI - Trường Học</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Đảm bảo camera cover hết khung hình */
        #video-preview { object-fit: cover; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: bold; }
        .tab-inactive { color: #6b7280; }
        
        /* Loading spinner */
        .loader {
            border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3b82f6;
            width: 24px; height: 24px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div>
            <h1 class="text-lg font-bold"><i class="fas fa-shield-halved mr-2"></i>FoodCheck AI</h1>
            <p class="text-xs text-blue-200" id="user-info">Đang xác thực...</p>
        </div>
        <div class="text-right">
            <span id="network-status" class="text-xs bg-green-500 px-2 py-1 rounded-full"><i class="fas fa-wifi"></i> Online</span>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <div class="flex bg-white shadow-sm z-10">
        <button id="tab-camera" class="flex-1 py-3 text-center tab-active transition-colors" onclick="switchTab('camera')">
            <i class="fas fa-camera mr-1"></i> Kiểm Duyệt
        </button>
        <button id="tab-dashboard" class="flex-1 py-3 text-center tab-inactive transition-colors" onclick="switchTab('dashboard')">
            <i class="fas fa-chart-line mr-1"></i> Bảng Tin Realtime
        </button>
    </div>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 overflow-y-auto relative">

        <!-- SECTION: CAMERA & AI -->
        <section id="section-camera" class="h-full flex flex-col p-4">
            
            <!-- Camera Viewfinder -->
            <div class="relative flex-1 bg-black rounded-xl overflow-hidden shadow-inner mb-4 flex items-center justify-center">
                <video id="video-preview" class="absolute inset-0 w-full h-full hidden" autoplay playsinline></video>
                <div id="camera-placeholder" class="text-gray-400 text-center">
                    <i class="fas fa-camera text-4xl mb-2"></i>
                    <p>Nhấn "Mở Camera" để bắt đầu</p>
                </div>
                
                <!-- Overlay Loading lúc gửi AI -->
                <div id="ai-loading-overlay" class="absolute inset-0 bg-black bg-opacity-70 flex flex-col items-center justify-center hidden z-20">
                    <div class="loader w-12 h-12 mb-3"></div>
                    <p class="text-white font-semibold">AI Đang phân tích thực phẩm...</p>
                    <p class="text-gray-300 text-sm">Vui lòng giữ kết nối</p>
                </div>
            </div>

            <!-- Nút điều khiển -->
            <div class="flex flex-col gap-3">
                <button id="btn-start-camera" class="bg-gray-800 text-white py-3 rounded-lg font-bold shadow-md active:bg-gray-700 transition">
                    <i class="fas fa-video mr-2"></i> Mở Camera
                </button>
                <button id="btn-capture" class="bg-blue-600 text-white py-4 rounded-lg font-bold shadow-lg active:bg-blue-700 transition hidden text-lg">
                    <i class="fas fa-crosshairs mr-2"></i> Chụp & Kiểm Duyệt Tự Động
                </button>
            </div>

            <!-- GPS Info -->
            <div class="mt-3 text-xs text-gray-500 text-center" id="gps-status">
                <i class="fas fa-location-dot"></i> Đang lấy vị trí GPS để đóng dấu...
            </div>
            
            <!-- Ẩn Canvas dùng để xử lý ảnh -->
            <canvas id="capture-canvas" class="hidden"></canvas>
        </section>

        <!-- SECTION: DASHBOARD REALTIME -->
        <section id="section-dashboard" class="hidden p-4 min-h-full bg-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-gray-700">Lịch sử hôm nay</h2>
                <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded border border-blue-200">
                    <i class="fas fa-sync fa-spin mr-1"></i> Live
                </span>
            </div>
            
            <!-- Danh sách card thực phẩm -->
            <div id="dashboard-list" class="flex flex-col gap-4 pb-10">
                <div class="text-center text-gray-500 py-10">Đang tải dữ liệu...</div>
            </div>
        </section>

    </main>

    <!-- Thư viện Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
        import { getAI, getGenerativeModel, GoogleAIBackend } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-ai.js";

        // --- CẤU HÌNH HỆ THỐNG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAtoX3PysX692bNg6nA55Qriv5P-7phmFQ",
            authDomain: "aiminh-d96d4.firebaseapp.com",
            projectId: "aiminh-d96d4",
            storageBucket: "aiminh-d96d4.firebasestorage.app",
            messagingSenderId: "159603803322",
            appId: "1:159603803322:web:3693589412fca5c3456e83"
        };
        
        const appId = 'food-inspection-app';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // --- KHỞI TẠO AI MODEL (Firebase AI SDK) ---
        let aiModel;
        try {
            const ai = getAI(app, { backend: new GoogleAIBackend() });
            // Dùng gemini-2.5-flash để hỗ trợ phân tích hình ảnh (Multimodal) tốt nhất
            aiModel = getGenerativeModel(ai, { 
                model: "gemini-2.5-flash",
                generationConfig: { responseMimeType: "application/json" }
            });
            console.log("Firebase AI Model initialized!");
        } catch (e) {
            console.error("Lỗi khởi tạo AI Model:", e);
        }

        // --- BIẾN TOÀN CỤC ---
        let videoStream = null;
        let currentLat = "Chưa rõ";
        let currentLon = "Chưa rõ";
        
        // --- UI ELEMENTS ---
        const videoPreview = document.getElementById('video-preview');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const btnStartCamera = document.getElementById('btn-start-camera');
        const btnCapture = document.getElementById('btn-capture');
        const canvas = document.getElementById('capture-canvas');
        const aiLoadingOverlay = document.getElementById('ai-loading-overlay');
        const gpsStatus = document.getElementById('gps-status');
        const dashboardList = document.getElementById('dashboard-list');

        // --- 1. XÁC THỰC FIREBASE (Bắt buộc trước khi thao tác DB) ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (customTokenError) {
                        console.warn("Lỗi token môi trường (do dùng cấu hình DB riêng), đang chuyển sang đăng nhập ẩn danh...", customTokenError);
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Lỗi xác thực:", error);
                document.getElementById('user-info').innerText = "Lỗi xác thực!";
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('user-info').innerText = `Người trực: Phụ huynh/Y tế`;
                setupRealtimeListener(); // Bật lắng nghe dữ liệu khi đã login
            }
        });

        // --- 2. CAMERA & GPS LOGIC ---
        async function startCamera() {
            try {
                // Ưu tiên camera sau (môi trường kiểm duyệt)
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                videoPreview.srcObject = videoStream;
                videoPreview.classList.remove('hidden');
                cameraPlaceholder.classList.add('hidden');
                
                btnStartCamera.classList.add('hidden');
                btnCapture.classList.remove('hidden');

                // Lấy GPS ngay khi mở camera
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        currentLat = pos.coords.latitude.toFixed(5);
                        currentLon = pos.coords.longitude.toFixed(5);
                        gpsStatus.innerHTML = `<i class="fas fa-location-dot text-green-500"></i> GPS: ${currentLat}, ${currentLon}`;
                    },
                    (err) => {
                        gpsStatus.innerHTML = `<i class="fas fa-exclamation-triangle text-yellow-500"></i> Không lấy được GPS (Dùng địa điểm mặc định)`;
                    }
                );
            } catch (err) {
                console.error(err);
                
                // Thay thế alert() bằng UI trực quan
                const cameraPlaceholder = document.getElementById('camera-placeholder');
                cameraPlaceholder.innerHTML = `
                    <div class="bg-red-50 border border-red-200 p-4 rounded-lg">
                        <i class="fas fa-video-slash text-4xl mb-2 text-red-500"></i>
                        <p class="text-red-700 font-bold mb-2">Lỗi truy cập Camera</p>
                        <p class="text-sm text-red-600 mb-2">Trình duyệt đang chặn quyền máy ảnh. Nguyên nhân thường gặp:</p>
                        <ul class="text-left text-sm list-disc pl-6 text-red-600 space-y-1">
                            <li>Đang mở trực tiếp file (không có HTTPS).</li>
                            <li>Đang mở trong Zalo/Messenger. Hãy chọn <b>"Mở bằng trình duyệt gốc" (Chrome/Safari)</b>.</li>
                            <li>Chưa cấp quyền máy ảnh cho trình duyệt.</li>
                        </ul>
                    </div>
                `;
                cameraPlaceholder.classList.remove('hidden');
                document.getElementById('video-preview').classList.add('hidden');
                
                // Đảm bảo nút chụp bị ẩn
                document.getElementById('btn-start-camera').classList.add('hidden');
                document.getElementById('btn-capture').classList.add('hidden');
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            videoPreview.classList.add('hidden');
            cameraPlaceholder.classList.remove('hidden');
            btnStartCamera.classList.remove('hidden');
            btnCapture.classList.add('hidden');
        }

        // Chụp và đóng dấu Watermark
        function captureAndWatermark() {
            const ctx = canvas.getContext('2d');
            // Thu nhỏ ảnh để tiết kiệm băng thông & tránh lỗi 1MB của Firestore
            const targetWidth = 800; 
            const scale = targetWidth / videoPreview.videoWidth;
            canvas.width = targetWidth;
            canvas.height = videoPreview.videoHeight * scale;

            // Vẽ frame từ video
            ctx.drawImage(videoPreview, 0, 0, canvas.width, canvas.height);

            // Vẽ Watermark (Chống gian lận)
            const timestampStr = new Date().toLocaleString('vi-VN');
            
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; // Nền đen mờ
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.fillText(`THỜI GIAN: ${timestampStr}`, 15, canvas.height - 35);
            ctx.font = "14px Arial";
            ctx.fillText(`GPS: ${currentLat}, ${currentLon} | Bếp ăn trường học`, 15, canvas.height - 15);

            // Chuyển sang Base64 (chất lượng 0.7 để nén)
        return canvas.toDataURL('image/jpeg', 0.7);
    }

    // --- 3. GEMINI AI LOGIC (Dùng Firebase AI SDK) ---
    async function analyzeWithGemini(base64Image) {
        if (!aiModel) throw new Error("Mô hình AI chưa được khởi tạo. Hãy kiểm tra lại API Key.");

        // Cắt bỏ phần header của base64
        const base64Data = base64Image.split(',')[1];
        
        const prompt = `
            Bạn là một chuyên gia an toàn vệ sinh thực phẩm tại trường học. 
            Hãy nhìn vào bức ảnh thực phẩm được đưa đến bếp ăn sáng nay.
            Phân tích và trả về CHỈ MỘT chuỗi JSON hợp lệ theo cấu trúc sau (không có markdown, không có text thừa):
            {
                "ten_thuc_pham": "Tên món/nhóm (VD: Thịt lợn, Cải thảo, Sữa tươi)",
                "danh_gia": "Tươi ngon / Bình thường / Nghi ngờ hỏng / Cận date",
                "mau_sac_canh_bao": "green" (nếu tốt) hoặc "yellow" (nếu bình thường) hoặc "red" (nếu hỏng/cận date),
                "chi_tiet": "Mô tả ngắn gọn 1 câu lý do đánh giá"
            }
        `;

        // Cấu trúc dữ liệu hình ảnh cho SDK
        const imagePart = {
            inlineData: { 
                mimeType: "image/jpeg", 
                data: base64Data 
            }
        };

        // Gọi model qua SDK (Thay cho hàm fetch truyền thống)
        const result = await aiModel.generateContent([prompt, imagePart]);
        const response = result.response;
        const textResponse = response.text();
        
        return JSON.parse(textResponse);
    }

    // --- 4. FIREBASE REALTIME SYNC ---
    async function saveToFirestore(base64Image, aiResult) {
            if (!currentUser) return;
            
            const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'inspections');
            await addDoc(collectionRef, {
                imageUrl: base64Image,
                aiAnalysis: aiResult,
                timestamp: Date.now(),
                gps: { lat: currentLat, lon: currentLon },
                inspector: currentUser.uid.substring(0, 5) // Mock ID người chụp
            });
        }

        function setupRealtimeListener() {
            if (!currentUser) return;
            
            const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'inspections');
            
            onSnapshot(collectionRef, (snapshot) => {
                const docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                
                // Sắp xếp trên RAM (Tránh Rule 2: không dùng orderBy phức tạp)
                docs.sort((a, b) => b.timestamp - a.timestamp);
                
                renderDashboard(docs);
            }, (error) => {
                console.error("Lỗi Realtime:", error);
                dashboardList.innerHTML = `<div class="text-red-500 text-center">Lỗi tải dữ liệu.</div>`;
            });
        }

        function renderDashboard(docs) {
            if (docs.length === 0) {
                dashboardList.innerHTML = `<div class="text-center text-gray-500 py-10"><i class="fas fa-box-open text-3xl mb-2"></i><br>Chưa có lượt kiểm duyệt nào hôm nay.</div>`;
                return;
            }

            dashboardList.innerHTML = docs.map(doc => {
                const ai = doc.aiAnalysis || {};
                const timeStr = new Date(doc.timestamp).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                
                // Set màu badge theo AI đánh giá
                let badgeClass = "bg-green-100 text-green-800 border-green-200";
                let icon = "fa-check-circle text-green-600";
                if (ai.mau_sac_canh_bao === 'red') { badgeClass = "bg-red-100 text-red-800 border-red-200"; icon = "fa-triangle-exclamation text-red-600"; }
                if (ai.mau_sac_canh_bao === 'yellow') { badgeClass = "bg-yellow-100 text-yellow-800 border-yellow-200"; icon = "fa-circle-exclamation text-yellow-600"; }

                return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <img src="${doc.imageUrl}" class="w-full h-48 object-cover" alt="Thực phẩm">
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg text-gray-800">${ai.ten_thuc_pham || 'Không xác định'}</h3>
                            <span class="text-xs text-gray-500"><i class="far fa-clock"></i> ${timeStr}</span>
                        </div>
                        <div class="inline-flex items-center px-2.5 py-0.5 rounded border text-sm font-medium mb-3 ${badgeClass}">
                            <i class="fas ${icon} mr-1.5"></i> ${ai.danh_gia || 'Chưa rõ'}
                        </div>
                        <p class="text-sm text-gray-600">${ai.chi_tiet || ''}</p>
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- 5. SỰ KIỆN NÚT BẤM ---
        btnStartCamera.addEventListener('click', startCamera);

        btnCapture.addEventListener('click', async () => {
            try {
                aiLoadingOverlay.classList.remove('hidden');
                btnCapture.disabled = true;

                // 1. Chụp & Watermark (Anti-fraud)
                const base64Image = captureAndWatermark();
                
                // 2. Gửi cho AI phân tích
                const aiResult = await analyzeWithGemini(base64Image);
                
                // 3. Đẩy lên Firestore (Realtime Dashboard sẽ tự cập nhật)
                await saveToFirestore(base64Image, aiResult);

                // Thành công
                aiLoadingOverlay.classList.add('hidden');
                btnCapture.disabled = false;
                
                // Tự động chuyển qua tab Bảng tin để xem kết quả
                window.switchTab('dashboard');

            } catch (error) {
                console.error(error);
                alert("Có lỗi xảy ra: " + error.message);
                aiLoadingOverlay.classList.add('hidden');
                btnCapture.disabled = false;
            }
        });

        // Hàm chuyển Tab UI (gắn vào window để gọi từ onclick HTML)
        window.switchTab = function(tab) {
            const camSec = document.getElementById('section-camera');
            const dashSec = document.getElementById('section-dashboard');
            const camTabBtn = document.getElementById('tab-camera');
            const dashTabBtn = document.getElementById('tab-dashboard');

            if (tab === 'camera') {
                camSec.classList.remove('hidden');
                dashSec.classList.add('hidden');
                camTabBtn.className = "flex-1 py-3 text-center tab-active transition-colors";
                dashTabBtn.className = "flex-1 py-3 text-center tab-inactive transition-colors";
            } else {
                camSec.classList.add('hidden');
                dashSec.classList.remove('hidden');
                camTabBtn.className = "flex-1 py-3 text-center tab-inactive transition-colors";
                dashTabBtn.className = "flex-1 py-3 text-center tab-active transition-colors";
                // Tắt camera khi sang tab khác để tiết kiệm pin
                stopCamera();
            }
        };

        // Khởi động Auth ngay khi load
        initAuth();

    </script>
</body>
</html>
