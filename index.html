<!DOCTYPE html>
<html lang="vi">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>

</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div>
            <h1 class="text-lg font-bold"><i class="fas fa-shield-halved mr-2"></i>FoodCheck AI</h1>
            <p class="text-xs text-blue-200" id="user-info">Đang xác thực...</p>
        </div>
        <div class="text-right">
            <span id="network-status" class="text-xs bg-green-500 px-2 py-1 rounded-full"><i class="fas fa-wifi"></i> Online</span>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <div class="flex bg-white shadow-sm z-10">
        <button id="tab-camera" class="flex-1 py-3 text-center tab-active transition-colors" onclick="switchTab('camera')">
            <i class="fas fa-camera mr-1"></i> Chụp Ảnh
        </button>
        <button id="tab-dashboard" class="flex-1 py-3 text-center tab-inactive transition-colors" onclick="switchTab('dashboard')">
            <i class="fas fa-chart-line mr-1"></i> Bảng Tin
        </button>
    </div>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 overflow-y-auto relative">

        <!-- SECTION: CAMERA & AI -->
        <section id="section-camera" class="h-full flex flex-col p-4">
            
            <!-- Camera Viewfinder -->
            <div class="relative flex-1 bg-black rounded-xl overflow-hidden shadow-inner mb-4 flex items-center justify-center">
                <video id="video-preview" class="absolute inset-0 w-full h-full hidden" autoplay playsinline></video>
                <div id="camera-placeholder" class="text-gray-400 text-center px-4 w-full">
                    <i class="fas fa-camera text-4xl mb-2"></i>
                    <p>Nhấn "Mở Camera" để bắt đầu</p>

                <!-- Overlay Loading lúc gửi AI / Lưu -->
                <div id="ai-loading-overlay" class="absolute inset-0 bg-black bg-opacity-80 flex flex-col items-center justify-center hidden z-20">

                    <p class="text-gray-300 text-sm mt-1">Vui lòng đợi trong giây lát</p>
                </div>
            </div>

            <!-- Nút điều khiển -->
            <div class="flex flex-col gap-3">
                <button id="btn-start-camera" class="bg-gray-800 text-white py-3 rounded-lg font-bold shadow-md active:bg-gray-700 transition w-full">
                    <i class="fas fa-video mr-2"></i> Mở Camera
                </button>

                <!-- Khu vực điều khiển khi bật camera -->
                <div id="capture-controls" class="hidden flex-col gap-3 w-full">
                    
                    <!-- Toggle Switch AI -->
                    <label class="flex items-center justify-between cursor-pointer bg-white p-3 rounded-lg shadow-sm border border-gray-200">
                        <span class="text-sm font-medium text-gray-800"><i class="fas fa-robot text-blue-500 mr-2"></i>Dùng AI phân tích thực phẩm</span>
                        <div class="relative">
                            <input type="checkbox" id="ai-toggle" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </div>
                    </label>

                    <button id="btn-capture" class="bg-blue-600 text-white py-4 rounded-lg font-bold shadow-lg active:bg-blue-700 transition text-lg w-full">
                        <i class="fas fa-camera mr-2"></i> Chụp Ảnh
                    </button>
                </div>
            </div>

            <!-- GPS Info -->
            <div class="mt-3 text-xs text-gray-500 text-center" id="gps-status">
                <i class="fas fa-location-dot"></i> Đang chờ tín hiệu GPS...
            </div>
            
            <!-- Ẩn Canvas dùng để xử lý ảnh -->
            <canvas id="capture-canvas" class="hidden"></canvas>
        </section>

        <!-- SECTION: DASHBOARD REALTIME -->
        <section id="section-dashboard" class="hidden p-4 min-h-full bg-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-gray-700">Lịch sử hôm nay</h2>
                <span class="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded border border-blue-200 flex items-center">
                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse mr-1.5"></div> Live
                </span>
            </div>
            
            <!-- Danh sách card thực phẩm -->
            <div id="dashboard-list" class="flex flex-col gap-4 pb-10">
                <div class="text-center text-gray-500 py-10">Đang tải dữ liệu...</div>
            </div>
        </section>

    </main>

    <!-- Thư viện Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
        import { getAI, getGenerativeModel, GoogleAIBackend } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-ai.js";

        // --- CẤU HÌNH HỆ THỐNG ---
        let firebaseConfig = {
            apiKey: "AIzaSyAtoX3PysX692bNg6nA55Qriv5P-7phmFQ",
            authDomain: "aiminh-d96d4.firebaseapp.com",
            projectId: "aiminh-d96d4",
            storageBucket: "aiminh-d96d4.firebasestorage.app",
            messagingSenderId: "159603803322",
            appId: "1:159603803322:web:3693589412fca5c3456e83"
        };
        
        // Cấu trúc Collection ID
        const appId = 'food-inspection-app'; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;

        // --- KHỞI TẠO AI MODEL (Firebase AI SDK) ---
        let aiModel;
        try {
            const ai = getAI(app, { backend: new GoogleAIBackend() });
            aiModel = getGenerativeModel(ai, { 
                model: "gemini-2.5-flash",
                generationConfig: { responseMimeType: "application/json" }
            });
            console.log("Firebase AI Model initialized!");
        } catch (e) {
            console.error("Lỗi khởi tạo AI Model:", e);
        }

        // --- BIẾN TOÀN CỤC ---
        let videoStream = null;
        let currentLat = "Chưa rõ";
        let currentLon = "Chưa rõ";
        
        // --- UI ELEMENTS ---
        const videoPreview = document.getElementById('video-preview');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const btnStartCamera = document.getElementById('btn-start-camera');
        const captureControls = document.getElementById('capture-controls');
        const btnCapture = document.getElementById('btn-capture');
        const aiToggle = document.getElementById('ai-toggle');
        const canvas = document.getElementById('capture-canvas');
        const aiLoadingOverlay = document.getElementById('ai-loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const gpsStatus = document.getElementById('gps-status');
        const dashboardList = document.getElementById('dashboard-list');

        // --- 1. XÁC THỰC FIREBASE ---
        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (customTokenError) {
                        console.warn("Lỗi token môi trường, chuyển sang đăng nhập ẩn danh...");
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Lỗi xác thực:", error);
                document.getElementById('user-info').innerText = "Lỗi xác thực!";
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('user-info').innerText = `Người trực: ID-${user.uid.substring(0,4)}`;
                setupRealtimeListener(); // Bật lắng nghe dữ liệu khi đã login
            }
        });

        // --- 2. CAMERA & GPS LOGIC ---
        async function startCamera() {
            try {
                // Ưu tiên camera sau (môi trường kiểm duyệt)
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                videoPreview.srcObject = videoStream;
                videoPreview.classList.remove('hidden');
                cameraPlaceholder.classList.add('hidden');
                
                // Đổi UI sang chế độ chụp
                btnStartCamera.classList.add('hidden');
                captureControls.classList.remove('hidden');
                captureControls.classList.add('flex');

                // Lấy GPS ngay khi mở camera
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        currentLat = pos.coords.latitude.toFixed(5);
                        currentLon = pos.coords.longitude.toFixed(5);
                        gpsStatus.innerHTML = `<i class="fas fa-location-dot text-green-500"></i> GPS: ${currentLat}, ${currentLon}`;
                    },
                    (err) => {
                        gpsStatus.innerHTML = `<i class="fas fa-exclamation-triangle text-yellow-500"></i> Không lấy được GPS (Dùng mặc định)`;
                    }
                );
            } catch (err) {
                console.error(err);
                cameraPlaceholder.innerHTML = `
                    <div class="bg-red-50 border border-red-200 p-4 rounded-lg text-left">
                        <div class="text-center mb-2"><i class="fas fa-video-slash text-4xl text-red-500"></i></div>
                        <p class="text-red-700 font-bold mb-1">Lỗi truy cập Camera</p>
                        <p class="text-sm text-red-600 mb-2">Không thể mở máy ảnh. Nguyên nhân thường gặp:</p>
                        <ul class="text-xs list-disc pl-5 text-red-600 space-y-1">
                            <li>Ứng dụng đang mở trực tiếp từ file (thiếu HTTPS).</li>
                            <li>Bạn đang mở link trong Zalo/Messenger. Hãy bấm nút 3 chấm góc trên chọn <b>"Mở bằng trình duyệt"</b> (Chrome/Safari).</li>
                            <li>Chưa cấp quyền máy ảnh.</li>
                        </ul>
                    </div>
                `;
                btnStartCamera.classList.add('hidden');
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            videoPreview.classList.add('hidden');
            cameraPlaceholder.classList.remove('hidden');
            
            btnStartCamera.classList.remove('hidden');
            captureControls.classList.add('hidden');
            captureControls.classList.remove('flex');
        }

        // Chụp và đóng dấu Watermark
        function captureAndWatermark() {
            const ctx = canvas.getContext('2d');
            const targetWidth = 800; 
            const scale = targetWidth / videoPreview.videoWidth;
            canvas.width = targetWidth;
            canvas.height = videoPreview.videoHeight * scale;

            ctx.drawImage(videoPreview, 0, 0, canvas.width, canvas.height);

            const timestampStr = new Date().toLocaleString('vi-VN');
            
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);
            
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.fillText(`THỜI GIAN: ${timestampStr}`, 15, canvas.height - 35);
            ctx.font = "14px Arial";
            ctx.fillText(`GPS: ${currentLat}, ${currentLon} | Bếp ăn trường học`, 15, canvas.height - 15);

            return canvas.toDataURL('image/jpeg', 0.7);
        }

        // --- 3. GEMINI AI LOGIC (Dùng Firebase AI SDK) ---
        async function analyzeWithGemini(base64Image) {
            if (!aiModel) throw new Error("Mô hình AI chưa được khởi tạo. Hãy kiểm tra lại kết nối mạng.");

            const base64Data = base64Image.split(',')[1];
            
            const prompt = `
                Bạn là chuyên gia an toàn thực phẩm. Nhìn vào ảnh, phân tích và trả về CHỈ MỘT chuỗi JSON:
                {
                    "ten_thuc_pham": "Tên món/nhóm (VD: Thịt lợn, Rau cải)",
                    "danh_gia": "Tươi ngon / Bình thường / Nghi ngờ hỏng",
                    "mau_sac_canh_bao": "green" (tốt) hoặc "yellow" (bình thường) hoặc "red" (hỏng),
                    "chi_tiet": "Mô tả ngắn 1 câu lý do"
                }
            `;

            const imagePart = { inlineData: { mimeType: "image/jpeg", data: base64Data } };

            const result = await aiModel.generateContent([prompt, imagePart]);
            const response = result.response;
            return JSON.parse(response.text());
        }

        // --- 4. FIREBASE REALTIME SYNC ---
        async function saveToFirestore(base64Image, aiResult) {
            if (!currentUser) return;
            
            const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'inspections');
            await addDoc(collectionRef, {
                imageUrl: base64Image,
                aiAnalysis: aiResult,
                timestamp: Date.now(),
                gps: { lat: currentLat, lon: currentLon },
                inspector: currentUser.uid,
                hasAI: aiToggle.checked
            });
        }

        function setupRealtimeListener() {
            if (!currentUser) return;
            
            const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'inspections');
            
            onSnapshot(collectionRef, (snapshot) => {
                const docs = [];
                snapshot.forEach(doc => docs.push({ id: doc.id, ...doc.data() }));
                
                docs.sort((a, b) => b.timestamp - a.timestamp);
                renderDashboard(docs);
            }, (error) => {
                console.error("Lỗi Realtime:", error);
                dashboardList.innerHTML = `<div class="text-red-500 text-center p-4">Lỗi kết nối CSDL Realtime.</div>`;
            });
        }

        function renderDashboard(docs) {
            if (docs.length === 0) {
                dashboardList.innerHTML = `<div class="text-center text-gray-400 py-12"><i class="fas fa-folder-open text-4xl mb-3"></i><br>Chưa có dữ liệu kiểm duyệt hôm nay.</div>`;
                return;
            }

            dashboardList.innerHTML = docs.map(doc => {
                const ai = doc.aiAnalysis || {};
                const timeStr = new Date(doc.timestamp).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                
                // Mặc định cho ảnh tư liệu (Không dùng AI)
                let badgeClass = "bg-gray-100 text-gray-600 border-gray-200";
                let icon = "fa-image text-gray-500";
                
                // Nếu có dùng AI
                if (doc.hasAI !== false) {
                    if (ai.mau_sac_canh_bao === 'green') { badgeClass = "bg-green-100 text-green-800 border-green-200"; icon = "fa-check-circle text-green-600"; }
                    if (ai.mau_sac_canh_bao === 'red') { badgeClass = "bg-red-100 text-red-800 border-red-200"; icon = "fa-triangle-exclamation text-red-600"; }
                    if (ai.mau_sac_canh_bao === 'yellow') { badgeClass = "bg-yellow-100 text-yellow-800 border-yellow-200"; icon = "fa-circle-exclamation text-yellow-600"; }
                }

                return `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <img src="${doc.imageUrl}" class="w-full h-48 object-cover bg-gray-50" alt="Thực phẩm">
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-gray-800">${ai.ten_thuc_pham || 'Không xác định'}</h3>
                            <span class="text-xs text-gray-500 flex items-center"><i class="far fa-clock mr-1"></i> ${timeStr}</span>
                        </div>
                        <div class="inline-flex items-center px-2 py-1 rounded border text-xs font-medium mb-2 ${badgeClass}">
                            <i class="fas ${icon} mr-1.5"></i> ${ai.danh_gia || 'Chưa phân tích'}
                        </div>
                        ${ai.chi_tiet ? `<p class="text-sm text-gray-600 mt-1">${ai.chi_tiet}</p>` : ''}
                    </div>
                </div>
                `;
            }).join('');
        }

        // --- 5. SỰ KIỆN NÚT BẤM ---
        btnStartCamera.addEventListener('click', startCamera);

        btnCapture.addEventListener('click', async () => {
            const useAI = aiToggle.checked;
            
            try {
                // Thay đổi UI loading tùy theo chế độ
                loadingText.innerText = useAI ? "AI Đang phân tích ảnh..." : "Đang lưu ảnh tư liệu...";
                aiLoadingOverlay.classList.remove('hidden');
                btnCapture.disabled = true;

                // 1. Chụp & Watermark (Anti-fraud)
                const base64Image = captureAndWatermark();
                
                let aiResult = null;
                
                // 2. Tùy chọn xử lý AI
                if (useAI) {
                    aiResult = await analyzeWithGemini(base64Image);
                } else {
                    // Dữ liệu mock cho ảnh tư liệu thường
                    aiResult = {
                        ten_thuc_pham: "Ảnh tư liệu",
                        danh_gia: "Lưu trữ thủ công",
                        mau_sac_canh_bao: "gray",
                        chi_tiet: "Hình ảnh được chụp để làm bằng chứng (không qua AI phân tích)."
                    };
                }
                
                // 3. Đẩy lên Firestore
                await saveToFirestore(base64Image, aiResult);

                // Thành công
                aiLoadingOverlay.classList.add('hidden');
                btnCapture.disabled = false;
                
                // Chuyển qua tab Bảng tin
                window.switchTab('dashboard');

            } catch (error) {
                console.error(error);
                alert("Có lỗi xảy ra: " + error.message);
                aiLoadingOverlay.classList.add('hidden');
                btnCapture.disabled = false;
            }
        });

        // Hàm chuyển Tab UI
        window.switchTab = function(tab) {
            const camSec = document.getElementById('section-camera');
            const dashSec = document.getElementById('section-dashboard');
            const camTabBtn = document.getElementById('tab-camera');
            const dashTabBtn = document.getElementById('tab-dashboard');

            if (tab === 'camera') {
                camSec.classList.remove('hidden');
                dashSec.classList.add('hidden');
                camTabBtn.className = "flex-1 py-3 text-center tab-active transition-colors";
                dashTabBtn.className = "flex-1 py-3 text-center tab-inactive transition-colors";
            } else {
                camSec.classList.add('hidden');
                dashSec.classList.remove('hidden');
                camTabBtn.className = "flex-1 py-3 text-center tab-inactive transition-colors";
                dashTabBtn.className = "flex-1 py-3 text-center tab-active transition-colors";
                stopCamera();
            }
        };

        // Khởi động Auth
        initAuth();

    </script>
</body>
</html>


```
